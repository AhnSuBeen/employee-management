<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title='직원 목록')}"></head>
<body>
    <header th:replace="~{fragments/layout :: nav}"></header>
    <main>
        <h1>직원 목록</h1>
        <div class="list-layout">
            <aside class="card filter-sidebar">
                <h2>검색</h2>
                <form method="get" th:action="@{/employees}">
                    <div class="form-row">
                        <label for="filterName">이름</label>
                        <input type="text" id="filterName" name="name" th:value="${nameFilter}">
                    </div>
                    <div class="form-row">
                        <label for="filterDepartment">부서</label>
                        <input type="text" id="filterDepartment" name="department" th:value="${departmentFilter}">
                    </div>
                    <div class="form-row">
                        <label for="filterPosition">직급</label>
                        <input type="text" id="filterPosition" name="position" th:value="${positionFilter}">
                    </div>
                    <div class="filter-actions">
                        <button type="submit">검색</button>
                        <a class="btn" th:href="@{/employees}">초기화</a>
                    </div>
                </form>
            </aside>
            <div class="list-content">
                <p th:if="${employees.isEmpty()}">검색 결과가 없습니다.</p>
                <div class="card" th:unless="${employees.isEmpty()}">
                    <table>
                        <thead>
                            <tr>
                                <th>이름</th>
                                <th>부서</th>
                                <th>직급</th>
                                <th>이메일</th>
                                <th>전화번호</th>
                                <th>입사일</th>
                                <th>상태</th>
                            </tr>
                        </thead>
                        <tbody>
                            <th:block th:each="employee, iterStat : ${employees}">
                                <tr class="dept-group-row"
                                    th:if="${iterStat.index == 0 or employees[iterStat.index - 1].department != employee.department}">
                                    <td colspan="7" th:text="${employee.department}">부서</td>
                                </tr>
                                <tr th:classappend="${iterStat.index % 2 == 1} ? 'row-alt' : ''">
                                    <td>
                                        <a th:href="@{/employees/{id}(id=${employee.id})}" th:text="${employee.name}">이름</a>
                                    </td>
                                    <td th:text="${employee.department}">부서</td>
                                    <td th:text="${employee.position}">직급</td>
                                    <td th:text="${employee.email}">이메일</td>
                                    <td th:text="${employee.phone}">전화번호</td>
                                    <td th:text="${employee.hireDate}">입사일</td>
                                    <td><span th:replace="~{fragments/layout :: statusBadge(${employee.status})}"></span></td>
                                </tr>
                            </th:block>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
