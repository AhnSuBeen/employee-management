<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <title th:text="${title}">직원관리</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header class="site-header" th:fragment="nav">
        <nav>
            <a th:href="@{/employees}">직원 목록</a>
            <a th:href="@{/employees/new}">직원 등록</a>
        </nav>
    </header>

    <span th:fragment="statusBadge(status)" class="badge"
          th:classappend="'badge-' + ${#strings.replace(#strings.toLowerCase(status.name()), '_', '-')}"
          th:text="${(status.name() == 'ACTIVE' ? '🟢 ' : (status.name() == 'ON_LEAVE' ? '🟡 ' : '⚪ ')) + status}">상태</span>
</body>
</html>
