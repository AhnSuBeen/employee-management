services:
  postgres:
    image: postgres:17
    container_name: employee-management-postgres

    environment:
      # ${DB_NAME}
      POSTGRES_DB: employee_management
      # ${DB_USERNAME}
      POSTGRES_USER: postgres
      # ${DB_PASSWORD}
      POSTGRES_PASSWORD: postgres

    ports:
      # - "${DB_PORT}:5432"
      - "5432:5432"

    volumes:
      - employee-management-postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d employee_management"]
      interval: 5s
      timeout: 5s
      retries: 10

    restart: unless-stopped

volumes:
  employee-management-postgres-data: